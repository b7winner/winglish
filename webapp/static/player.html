<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{LESSON_TITLE}} — English Learning</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            text-align: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .video-container iframe {
            width: 100%;
            max-width: 640px;
            aspect-ratio: 16 / 9;
            border: none;
            border-radius: 12px;
        }
        .no-video {
            text-align: center;
            padding: 40px 20px;
            color: var(--tg-theme-hint-color, #999);
        }
        .button {
            display: block;
            width: calc(100% - 32px);
            margin: 16px;
            padding: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
        }
        .button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{LESSON_TITLE}}</h1>
    </div>
    <div class="video-container" id="videoContainer">
        <p class="no-video">Загрузка видео...</p>
    </div>
    <button class="button" onclick="Telegram.WebApp.close()">
        ✖️ Закрыть
    </button>
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        const videoUrl = '{{VIDEO_URL}}';

        function getYouTubeId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=)([\w-]+)/,
                /(?:youtu\.be\/)([\w-]+)/,
                /(?:youtube\.com\/embed\/)([\w-]+)/,
                /(?:youtube\.com\/shorts\/)([\w-]+)/,
            ];
            for (const p of patterns) {
                const m = url.match(p);
                if (m) return m[1];
            }
            return null;
        }

        function renderVideo() {
            const container = document.getElementById('videoContainer');
            if (!videoUrl) {
                container.innerHTML = '<p class="no-video">🎬 Видео не прикреплено</p>';
                return;
            }

            const youtubeId = getYouTubeId(videoUrl);
            if (youtubeId) {
                container.innerHTML = `
                    <iframe
                        src="https://www.youtube-nocookie.com/embed/${youtubeId}?autoplay=1&rel=0"
                        allow="autoplay; encrypted-media; fullscreen"
                        allowfullscreen
                    ></iframe>
                `;
                return;
            }

            container.innerHTML = `
                <p class="no-video">
                    🎬 <a href="${videoUrl}" target="_blank">Открыть видео</a>
                </p>
            `;
        }

        renderVideo();
    </script>
</body>
</html>
